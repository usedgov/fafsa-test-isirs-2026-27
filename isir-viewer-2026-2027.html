<body>

<h1>ISIR Viewer 2026-2027</h1>

<header>
    <aside>
        <h3>Input</h3>
        <label id="isir_sample_div">
            <h4>Select ISIR sample file:</h4>
            <input id="isir_file_src" multiple="" type="file" accept=".dat, .txt" onchange="isir_viewer.on_use_isir_files(this.files)" />
        </label>
        <div class="have-isir-frames">
            <h4>Select sample ISIR</h4>
            <label id="isir_search_selector">
                <input type="search" placeholder="Search ISIRs" onchange="isir_viewer.on_search_isirs(this.value)" />
            </label>
            <label id="isir_show_selector">
                <input type="number" value="1" min="1" onchange="isir_viewer.show_isir(this.valueAsNumber)" />
            </label>
            <div>(of <span id="isir_sample_count">22</span> samples)</div>
        </div>
        <label id="paste" class="only-if-target">
            <h4>ISIR from clipboard</h4>
            <textarea placeholder="Paste line delimited ISIRs here" rows="5" cols="60" wrap="off" spellcheck="false" autocomplete="off" autocorrect="off" onchange="isir_viewer.on_use_isir_text(this)" onpaste="isir_viewer.on_use_isir_text(this)"></textarea>
        </label>
    </aside>

    <aside>
        <h3>Output</h3>
        <label class="have-isir-frames">
            <h4>Export to Spreadsheet</h4>
            <button type="button" onclick="on_make_isir_spreadsheet([window.active_isir_frame])">Current</button>
            <button type="button" onclick="on_make_isir_spreadsheet(window.isir_samples)">All</button>
        </label>
        <pre><ul id="output_file_list"></ul></pre>
    </aside>

    <aside id="adv" class="only-if-target">
        <h3>Tools</h3>
        <div class="flex flex-col">
            <button type="button" onclick="isir_viewer.use_filtered_isirs()">Remove non-conformant ISIRs</button>
            <button type="button" onclick="isir_viewer.check_isirs_list()">Check all ISIRs (see console)</button>
        </div>
    </aside>
</header>

<output id="output_isirs"></output>
